<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Account — Kinetic Creations</title>
<link rel="icon" href="images/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1a3cc8;--blue-dark:#1230a0;--blue-light:#e8eeff;
  --red:#e8231a;--bg:#f0f2fa;--white:#fff;--text:#0d1333;--muted:#6b7280;
  --border:#d1d5e8;--shadow:0 4px 24px rgba(26,60,200,.10);
}
body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
a{text-decoration:none;color:inherit;}

/* ─── NAV ──────────────────────────────────────── */
nav{background:var(--white);border-bottom:1.5px solid var(--border);padding:0 20px;height:62px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:var(--shadow);}
.nav-logo{display:flex;align-items:center;gap:9px;text-decoration:none;}
.nav-logo img{width:34px;}
.nav-logo span{font-weight:800;font-size:.95rem;color:var(--blue);}
.nav-links{display:flex;align-items:center;gap:8px;}
.nav-links a{font-size:.82rem;color:var(--muted);padding:5px 10px;border-radius:8px;transition:all .2s;font-weight:500;}
.nav-links a:hover{background:var(--blue-light);color:var(--blue);}
/* hamburger */
.ham-btn{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:4px;}
.ham-btn span{display:block;width:22px;height:2px;background:var(--text);border-radius:2px;transition:all .3s;}
.ham-btn.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
.ham-btn.open span:nth-child(2){opacity:0;}
.ham-btn.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}
/* mobile menu */
.mob-nav{display:none;position:fixed;top:62px;left:0;right:0;background:var(--white);border-bottom:1.5px solid var(--border);padding:12px 16px;box-shadow:0 8px 24px rgba(26,60,200,.1);z-index:190;flex-direction:column;gap:6px;}
.mob-nav.open{display:flex;}
.mob-nav a,.mob-nav button{display:block;font-size:.88rem;color:var(--text);padding:10px 14px;border-radius:10px;transition:background .2s;font-weight:500;border:none;background:none;width:100%;text-align:left;font-family:'Poppins',sans-serif;cursor:pointer;}
.mob-nav a:hover,.mob-nav button:hover{background:var(--blue-light);color:var(--blue);}
.mob-nav .mob-logout{color:var(--red);}
.mob-nav .mob-logout:hover{background:#fff1f0;}
@media(max-width:580px){
  .nav-links{display:none;}
  .ham-btn{display:flex;}
}

/* ─── CONTENT ──────────────────────────────────── */
.container{max-width:680px;margin:0 auto;padding:28px 16px 60px;}
.page-title{font-size:1.5rem;font-weight:800;color:var(--blue);margin-bottom:4px;}
.page-sub{color:var(--muted);font-size:.88rem;margin-bottom:24px;}

.avatar-card{background:var(--white);border:1px solid var(--border);border-radius:18px;padding:24px;display:flex;align-items:center;gap:18px;margin-bottom:18px;box-shadow:var(--shadow);}
.avatar{width:68px;height:68px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--red));display:flex;align-items:center;justify-content:center;font-size:1.7rem;font-weight:800;color:#fff;flex-shrink:0;}
.avatar-info h2{font-size:1.05rem;font-weight:700;}
.avatar-info p{font-size:.78rem;color:var(--muted);margin-top:2px;}
.role-badge{display:inline-block;background:var(--blue-light);color:var(--blue);font-size:.66rem;font-weight:700;border-radius:12px;padding:3px 9px;margin-top:5px;text-transform:uppercase;letter-spacing:.5px;}

.section-card{background:var(--white);border:1px solid var(--border);border-radius:16px;margin-bottom:14px;overflow:hidden;box-shadow:var(--shadow);}
.section-card h3{font-size:.88rem;font-weight:700;color:var(--text);padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.section-body{padding:20px;}

.fg{margin-bottom:14px;}
.fg label{display:block;font-size:.77rem;font-weight:600;color:var(--text);margin-bottom:6px;}
/* Suppress browser built-in password eye icon */
input[type="password"]::-ms-reveal,
input[type="password"]::-ms-clear,
input[type="password"]::-webkit-contacts-auto-fill-button,
input[type="password"]::-webkit-credentials-auto-fill-button { display:none !important; visibility:hidden !important; pointer-events:none !important; }
input[type="password"] { -webkit-appearance:none; }
.fg input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:9px;padding:10px 13px;color:var(--text);font-family:'Poppins',sans-serif;font-size:.88rem;outline:none;transition:border .2s;}
.fg input:focus{border-color:var(--blue);background:#fff;}
.pw-wrap{position:relative;}
.pw-wrap input{padding-right:40px !important;}
.pw-eye{position:absolute;right:11px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);display:flex;align-items:center;padding:0;transition:color .2s;}
.pw-eye:hover{color:var(--blue);}
.pw-eye svg{width:17px;height:17px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

.btn-main{padding:10px 22px;background:var(--blue);border:none;border-radius:9px;color:#fff;font-family:'Poppins',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;transition:background .2s;}
.btn-main:hover{background:var(--blue-dark);}

.msg{font-size:.8rem;margin-top:10px;padding:9px 13px;border-radius:8px;display:none;}
.msg.show{display:block;}
.msg.ok{background:#eefaf3;color:#15803d;border:1px solid #86efac;}
.msg.err{background:#fff1f0;color:#dc2626;border:1px solid #fca5a5;}

/* logout card */
.logout-card{background:var(--white);border:1.5px solid #fca5a5;border-radius:16px;padding:20px;margin-bottom:14px;box-shadow:var(--shadow);}
.logout-card h3{font-size:.88rem;font-weight:700;color:var(--red);margin-bottom:8px;display:flex;align-items:center;gap:7px;}
.logout-card p{font-size:.82rem;color:var(--muted);margin-bottom:16px;}
.btn-logout{padding:11px 24px;background:var(--red);border:none;border-radius:9px;color:#fff;font-family:'Poppins',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;transition:background .2s;}
.btn-logout:hover{background:#c01a12;}

.order-row{border:1px solid var(--border);border-radius:10px;padding:12px 15px;margin-bottom:9px;}
.order-row:last-child{margin-bottom:0;}

@media(max-width:520px){.row2{grid-template-columns:1fr;}.avatar-card{flex-direction:column;text-align:center;}}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="index.html" class="nav-logo">
    <img src="images/logo.png" alt="">
    <span>Kinetic Creations</span>
  </a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="order.html">Order</a>
    <a href="chat.html">💬 Chat</a>
    <a href="#" onclick="doLogout()" style="color:var(--red);font-weight:600;">Logout</a>
  </div>
  <button class="ham-btn" id="ham" onclick="toggleMob()" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</nav>

<!-- MOBILE NAV -->
<div class="mob-nav" id="mob-nav">
  <a href="index.html" onclick="closeMob()">🏠 Home</a>
  <a href="order.html" onclick="closeMob()">📦 Place Order</a>
  <a href="chat.html" onclick="closeMob()">💬 Chat with Designer</a>
  <button class="mob-logout" onclick="doLogout()">🚪 Logout</button>
</div>

<div class="container">
  <div class="page-title">My Account</div>
  <p class="page-sub">Manage your profile and settings.</p>

  <!-- Avatar -->
  <div class="avatar-card" id="avatar-card"></div>

  <!-- Edit Profile -->
  <div class="section-card">
    <h3>👤 Edit Profile</h3>
    <div class="section-body">
      <div class="row2">
        <div class="fg"><label>First Name</label><input type="text" id="p-fn" placeholder="First name"></div>
        <div class="fg"><label>Last Name</label><input type="text" id="p-ln" placeholder="Last name"></div>
      </div>
      <div class="fg"><label>Username</label><input type="text" id="p-un" placeholder="username"></div>
      <div class="fg"><label>Email</label><input type="email" id="p-em" placeholder="email@example.com"></div>
      <div class="fg"><label>Phone</label><input type="tel" id="p-ph" placeholder="+977 98XXXXXXXX"></div>
      <button class="btn-main" onclick="saveProfile()">Save Changes</button>
      <div id="p-msg" class="msg"></div>
    </div>
  </div>

  <!-- Change Password -->
  <div class="section-card">
    <h3>🔒 Change Password</h3>
    <div class="section-body">
      <div class="fg">
        <label>Current Password</label>
        <div class="pw-wrap">
          <input type="password" id="pw-cur" placeholder="Current password">
          <button class="pw-eye" type="button" onclick="togglePw('pw-cur',this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="fg">
        <label>New Password</label>
        <div class="pw-wrap">
          <input type="password" id="pw-new" placeholder="Min 6 characters">
          <button class="pw-eye" type="button" onclick="togglePw('pw-new',this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="fg">
        <label>Confirm New Password</label>
        <div class="pw-wrap">
          <input type="password" id="pw-con" placeholder="Repeat new password">
          <button class="pw-eye" type="button" onclick="togglePw('pw-con',this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <button class="btn-main" onclick="changePassword()">Update Password</button>
      <div id="pw-msg" class="msg"></div>
    </div>
  </div>

  <!-- My Orders -->
  <div class="section-card">
    <h3>📦 My Orders</h3>
    <div class="section-body" id="my-orders"></div>
  </div>

  <!-- Logout -->
  <div class="logout-card">
    <h3>🚪 Logout</h3>
    <p>End your current session and return to the login page.</p>
    <button class="btn-logout" onclick="doLogout()">Logout Now</button>
  </div>
</div>

<script type="module" src="db.js"></script>
<script>
const session = KC.getSession();
if (!session || session.role === 'admin' || session.role === 'designer') window.location.href = 'login.html';
let user = session; // will be refreshed async

async function loadUser() {
  const fresh = await KC.getUserById(session.id);
  if (fresh) user = fresh;
}

async function init() {
  await loadUser();
  const init = ((user.firstName||user.username||'U')[0]).toUpperCase();
  document.getElementById('avatar-card').innerHTML = `
    <div class="avatar">${init}</div>
    <div class="avatar-info">
      <h2>${user.firstName ? user.firstName+' '+(user.lastName||'') : user.username}</h2>
      <p>${user.email}</p>
      <span class="role-badge">${user.role||'Customer'}</span>
    </div>`;
  document.getElementById('p-fn').value = user.firstName||'';
  document.getElementById('p-ln').value = user.lastName||'';
  document.getElementById('p-un').value = user.username||'';
  document.getElementById('p-em').value = user.email||'';
  document.getElementById('p-ph').value = user.phone||'';
  loadOrders();
}

async function saveProfile() {
  const un=document.getElementById('p-un').value.trim();
  const em=document.getElementById('p-em').value.trim();
  if(!un||!em){showMsg('p-msg','Username and email required.','err');return;}
  const allUsers=await KC.getUsers();
  const others=allUsers.filter(u=>u.id!==user.id);
  if(others.find(u=>u.username===un)){showMsg('p-msg','Username already taken.','err');return;}
  if(others.find(u=>u.email===em)){showMsg('p-msg','Email already in use.','err');return;}
  await KC.updateUser(user.id,{firstName:document.getElementById('p-fn').value.trim(),lastName:document.getElementById('p-ln').value.trim(),username:un,email:em,phone:document.getElementById('p-ph').value.trim()});
  user=await KC.getUserById(user.id)||user; KC.setSession(user);
  showMsg('p-msg','Profile updated!','ok'); await init();
}

async function changePassword() {
  const cur=document.getElementById('pw-cur').value;
  const nw=document.getElementById('pw-new').value;
  const con=document.getElementById('pw-con').value;
  if(!cur||!nw){showMsg('pw-msg','Fill in all fields.','err');return;}
  if(cur!==user.password){showMsg('pw-msg','Current password incorrect.','err');return;}
  if(nw.length<6){showMsg('pw-msg','Min 6 characters.','err');return;}
  if(nw!==con){showMsg('pw-msg','Passwords do not match.','err');return;}
  KC.updateUser(user.id,{password:nw}); user=KC.getUserById(user.id); KC.setSession(user);
  ['pw-cur','pw-new','pw-con'].forEach(id=>document.getElementById(id).value='');
  showMsg('pw-msg','Password changed!','ok');
}

async function loadOrders() {
  const allOrders=await KC.getOrders();
  const orders=allOrders.filter(o=>o.userId===user.id);
  const wrap=document.getElementById('my-orders');
  if(!orders.length){wrap.innerHTML='<p style="color:var(--muted);font-size:.85rem">No orders yet. <a href="order.html" style="color:var(--blue);font-weight:600">Place one →</a></p>';return;}
  const statusColor={Done:'#15803d',Cancelled:'#dc2626','In Progress':'#1a3cc8',Pending:'#a16207'};
  wrap.innerHTML=orders.sort((a,b)=>b.createdAt.localeCompare(a.createdAt)).map(o=>`
    <div class="order-row">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;">
        <strong style="font-size:.85rem">${o.template}</strong>
        <span style="font-size:.71rem;padding:3px 9px;border-radius:12px;font-weight:700;background:${o.status==='Done'?'#eefaf3':o.status==='Cancelled'?'#fff1f0':'#eff6ff'};color:${statusColor[o.status]||'#6b7280'}">${o.status}</span>
      </div>
      <div style="font-size:.76rem;color:var(--muted)">ID: ${o.id} · ${new Date(o.createdAt).toLocaleDateString()} · ${o.payment} · Rs.${o.price||'—'}</div>
    </div>`).join('');
}

function togglePw(id,btn){
  const inp=document.getElementById(id); const show=inp.type==='password';
  inp.type=show?'text':'password';
  btn.querySelector('svg').innerHTML=show
    ?'<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
    :'<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
}

function showMsg(id,text,type){const el=document.getElementById(id);el.textContent=text;el.className='msg show '+type;setTimeout(()=>el.className='msg',3500);}
function doLogout(){KC.clearSession();window.location.href='login.html';}

// mobile nav
function toggleMob(){
  const h=document.getElementById('ham'), m=document.getElementById('mob-nav');
  h.classList.toggle('open'); m.classList.toggle('open');
}
function closeMob(){
  document.getElementById('ham').classList.remove('open');
  document.getElementById('mob-nav').classList.remove('open');
}

init();
</script>
</body>
</html>
