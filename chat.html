<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat with Designer — Kinetic Creations</title>
<link rel="icon" href="images/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1a3cc8;--blue-dark:#1230a0;--blue-light:#e8eeff;
  --white:#fff;
  --bg:#f0f2fa;--card:#ffffff;--border:#d1d5e8;
  --accent:#1a3cc8;--accent2:#ff6b35;--text:#0d1333;--muted:#6b7280;
  --grad:linear-gradient(135deg,#1a3cc8,#e8231a);
  --bubble-me:rgba(244,166,29,.15);--bubble-them:#f5f7fc;
}
body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;}
a{text-decoration:none;color:inherit;}

/* header */
.chat-header{background:rgba(255,255,255,.97);backdrop-filter:blur(12px);border-bottom:1.5px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:14px;flex-shrink:0;}
.back-btn{display:flex;align-items:center;gap:5px;font-size:.8rem;color:var(--muted);cursor:pointer;transition:color .2s;}
.back-btn:hover{color:var(--accent);}
.back-btn svg{width:16px;}
.chat-avatar{width:42px;height:42px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1rem;flex-shrink:0;}
.chat-info{flex:1;}
.chat-info h3{font-size:.95rem;font-weight:600;}
.chat-info span{font-size:.75rem;color:var(--green, #2ecc71);}
.online-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#2ecc71;margin-right:5px;}

/* messages */
.messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px;}
.messages::-webkit-scrollbar{width:4px;}
.messages::-webkit-scrollbar-track{background:transparent;}
.messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

.msg-row{display:flex;gap:10px;max-width:75%;align-items:flex-end;}
.msg-row.me{align-self:flex-end;flex-direction:row-reverse;}
.msg-row.them{align-self:flex-start;}

.msg-avatar{width:30px;height:30px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;flex-shrink:0;}
.msg-avatar.them{background:#1e2030;}

.bubble{padding:10px 14px;border-radius:14px;font-size:.87rem;line-height:1.5;word-break:break-word;}
.msg-row.me .bubble{background:var(--bubble-me);border-bottom-right-radius:4px;border:1px solid #d0d9f7;}
.msg-row.them .bubble{background:var(--bubble-them);border-bottom-left-radius:4px;border:1px solid var(--border);}
.msg-time{font-size:.65rem;color:var(--muted);margin-top:4px;text-align:right;}
.msg-row.them .msg-time{text-align:left;}

.system-msg{text-align:center;font-size:.75rem;color:var(--muted);background:#e8eeff;border-radius:8px;padding:6px 14px;align-self:center;}

/* input */
.chat-input{border-top:1px solid var(--border);padding:14px 16px;display:flex;gap:10px;align-items:flex-end;background:rgba(255,255,255,.97);flex-shrink:0;}
.input-wrap{flex:1;background:#e8eeff;border:1px solid var(--border);border-radius:14px;display:flex;align-items:flex-end;padding:8px 14px;transition:border .2s;}
.input-wrap:focus-within{border-color:var(--accent);}
#msg-inp{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:'Poppins',sans-serif;font-size:.88rem;resize:none;max-height:100px;line-height:1.5;}
#msg-inp::placeholder{color:#b0b8c8;}
.send-btn{width:42px;height:42px;border-radius:50%;background:var(--blue);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .2s,transform .15s;}
.send-btn:hover{opacity:.9;transform:scale(1.05);}
.send-btn svg{width:17px;height:17px;fill:white;}

/* login wall */
.login-wall{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;text-align:center;}
.login-wall h2{margin-bottom:10px;}
.login-wall p{color:var(--muted);font-size:.9rem;margin-bottom:20px;}
.btn-main{padding:12px 28px;background:var(--blue);border:none;border-radius:10px;color:var(--text);font-family:'Poppins',sans-serif;font-size:.92rem;font-weight:600;cursor:pointer;}
</style>
</head>
<body>

<div class="chat-header">
  <a href="index.html" class="back-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
  </a>
  <div class="chat-avatar">KC</div>
  <div class="chat-info">
    <h3>Kinetic Creations Designer</h3>
    <span><span class="online-dot"></span>Online</span>
  </div>
</div>

<div id="chat-body" style="flex:1;display:flex;flex-direction:column;overflow:hidden;"></div>

<script src="db.js"></script>
<script>
const session = KC.getSession();
const DESIGNER_ID = 'designer';
const POLL_INTERVAL = 2000;

function renderChat() {
  const body = document.getElementById('chat-body');

  if (!session || session.role === 'admin' || session.role === 'designer') {
    // show login wall for guests
    body.innerHTML = `
      <div class="login-wall">
        <h2>Login to Chat</h2>
        <p>You need to be logged in to chat with our designer.</p>
        <button class="btn-main" onclick="window.location.href='login.html'">Login / Sign Up</button>
      </div>`;
    return;
  }

  body.innerHTML = `
    <div class="messages" id="messages"></div>
    <div class="chat-input">
      <div class="input-wrap">
        <textarea id="msg-inp" placeholder="Type a message…" rows="1" onkeydown="handleKey(event)"></textarea>
      </div>
      <button class="send-btn" onclick="sendMsg()">
        <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
      </button>
    </div>`;

  loadMessages();
  setInterval(loadMessages, POLL_INTERVAL);
  autoResize();
}

function loadMessages() {
  const msgs = KC.getConversation(session.id, DESIGNER_ID);
  KC.markRead(DESIGNER_ID, session.id);
  const container = document.getElementById('messages');
  if (!container) return;
  if (msgs.length === 0) {
    container.innerHTML = `<div class="system-msg">Start the conversation! Introduce yourself and describe your project. 👋</div>`;
    return;
  }
  const atBottom = container.scrollHeight - container.scrollTop <= container.clientHeight + 50;
  container.innerHTML = msgs.map(m => {
    const isMe = m.from === session.id;
    const t = new Date(m.ts).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    const initials = isMe ? (session.username||'U')[0].toUpperCase() : 'D';
    return `
      <div class="msg-row ${isMe ? 'me' : 'them'}">
        <div class="msg-avatar ${isMe ? 'me' : 'them'}">${initials}</div>
        <div>
          <div class="bubble">${escHtml(m.text)}</div>
          <div class="msg-time">${t}</div>
        </div>
      </div>`;
  }).join('');
  if (atBottom) container.scrollTop = container.scrollHeight;
}

function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }

function sendMsg() {
  const inp = document.getElementById('msg-inp');
  const text = inp.value.trim();
  if (!text) return;
  KC.sendMessage(session.id, DESIGNER_ID, text);
  inp.value = '';
  inp.style.height = '';
  loadMessages();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
  autoResize();
}

function autoResize() {
  const inp = document.getElementById('msg-inp');
  if (!inp) return;
  inp.addEventListener('input', () => {
    inp.style.height = '';
    inp.style.height = Math.min(inp.scrollHeight, 100) + 'px';
  });
}

renderChat();
</script>
</body>
</html>
