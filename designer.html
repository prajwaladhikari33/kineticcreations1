<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Designer Dashboard — Kinetic Creations</title>
<link rel="icon" href="images/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1a3cc8;--blue-dark:#1230a0;--blue-light:#e8eeff;--blue-mid:#d0d9f7;
  --red:#e8231a;--red-light:#fff1f0;
  --bg:#f0f2fa;--white:#fff;--text:#0d1333;--muted:#6b7280;
  --border:#d1d5e8;--shadow:0 2px 12px rgba(26,60,200,.08);
  --green:#15803d;--green-light:#eefaf3;--orange:#ea580c;
}
body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;}
a{text-decoration:none;color:inherit;}

.sidebar{width:220px;background:var(--white);border-right:1.5px solid var(--border);display:flex;flex-direction:column;position:fixed;left:0;top:0;height:100vh;z-index:200;box-shadow:var(--shadow);transition:transform .3s cubic-bezier(.4,0,.2,1);}
.sb-logo{display:flex;align-items:center;gap:10px;padding:18px 16px;border-bottom:1.5px solid var(--border);}
.sb-logo img{width:34px;}
.sb-logo .brand{font-weight:800;font-size:.88rem;color:var(--blue);}
.sb-logo .role{font-size:.65rem;color:var(--red);text-transform:uppercase;letter-spacing:.5px;}
.sb-nav{flex:1;padding:14px 10px;display:flex;flex-direction:column;gap:3px;}
.sb-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;cursor:pointer;font-size:.84rem;color:var(--muted);transition:all .2s;border:none;background:transparent;width:100%;text-align:left;font-family:'Poppins',sans-serif;}
.sb-btn:hover{background:var(--blue-light);color:var(--blue);}
.sb-btn.active{background:var(--blue);color:#fff;font-weight:600;}
.sb-btn .icon{font-size:.95rem;width:20px;text-align:center;}
.sb-bottom{padding:12px;border-top:1.5px solid var(--border);}
.logout-btn{display:flex;align-items:center;gap:8px;font-size:.82rem;color:var(--red);cursor:pointer;padding:9px 12px;border-radius:8px;transition:background .2s;background:none;border:none;width:100%;font-family:'Poppins',sans-serif;}
.logout-btn:hover{background:var(--red-light);}

.main{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh;width:calc(100% - 220px);}
.topbar{background:var(--white);border-bottom:1.5px solid var(--border);padding:13px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40;box-shadow:var(--shadow);width:100%;}
.topbar h2{font-size:1rem;font-weight:700;color:var(--blue);}
.topbar .ham-btn{flex-shrink:0;margin-right:8px;}
.user-chip{display:flex;align-items:center;gap:7px;background:var(--blue-light);border-radius:20px;padding:5px 14px;font-size:.78rem;font-weight:600;color:var(--blue);}
.dot-g{width:7px;height:7px;border-radius:50%;background:#22c55e;}

.content{padding:22px 24px;flex:1;}
.panel{display:none;} .panel.active{display:block;}

.stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:24px;}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;box-shadow:var(--shadow);}
.stat-num{font-size:1.7rem;font-weight:800;color:var(--blue);}
.stat-num.red{color:var(--red);}
.stat-num.green{color:var(--green);}
.stat-num.orange{color:var(--orange);}
.stat-lbl{font-size:.72rem;color:var(--muted);margin-top:3px;}

.section-title{font-size:1rem;font-weight:700;margin-bottom:14px;color:var(--text);}
.table-wrap{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--shadow);margin-bottom:20px;}
table{width:100%;border-collapse:collapse;font-size:.8rem;}
thead{background:var(--blue-light);}
th{padding:10px 14px;text-align:left;color:var(--blue);font-weight:600;border-bottom:1px solid var(--border);}
td{padding:9px 14px;border-bottom:1px solid var(--border);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#f8f9ff;}

.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.7rem;font-weight:700;}
.badge.Pending{background:#fef9ec;color:#a16207;border:1px solid #fde68a;}
.badge.InProgress{background:#eff6ff;color:var(--blue);border:1px solid var(--blue-mid);}
.badge.Done{background:var(--green-light);color:var(--green);border:1px solid #86efac;}
.badge.Cancelled{background:var(--red-light);color:var(--red);border:1px solid #fca5a5;}

select.status-sel{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:4px 8px;font-size:.75rem;color:var(--text);font-family:'Poppins',sans-serif;outline:none;cursor:pointer;}

/* CHAT */
.chat-layout{display:grid;grid-template-columns:240px 1fr;background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;height:580px;box-shadow:var(--shadow);}
.conv-list{border-right:1px solid var(--border);overflow-y:auto;background:#f8f9ff;}
.conv-hdr{padding:12px 14px;font-size:.72rem;color:var(--blue);font-weight:700;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);background:var(--blue-light);}
.conv-item{padding:12px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .15s;}
.conv-item:hover{background:var(--blue-light);}
.conv-item.active{background:var(--blue);color:#fff;}
.conv-item.active .conv-preview{color:rgba(255,255,255,.7);}
.conv-name{font-size:.85rem;font-weight:600;margin-bottom:2px;}
.conv-preview{font-size:.72rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.unread-dot{width:8px;height:8px;border-radius:50%;background:var(--red);flex-shrink:0;}

.chat-pane{display:flex;flex-direction:column;}
.chat-top{padding:11px 16px;border-bottom:1px solid var(--border);font-weight:700;font-size:.9rem;background:var(--blue-light);color:var(--blue);}
.messages{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:9px;}
.msg-row{display:flex;gap:8px;max-width:76%;align-items:flex-end;}
.msg-row.me{align-self:flex-end;flex-direction:row-reverse;}
.msg-row.them{align-self:flex-start;}
.bubble{padding:8px 13px;border-radius:12px;font-size:.84rem;line-height:1.5;word-break:break-word;}
.msg-row.me .bubble{background:var(--blue);color:#fff;border-bottom-right-radius:3px;}
.msg-row.them .bubble{background:var(--blue-light);color:var(--text);border-bottom-left-radius:3px;}
.msg-time{font-size:.62rem;color:var(--muted);margin-top:2px;}
.msg-row.me .msg-time{text-align:right;}
.no-conv{flex:1;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:.85rem;}
.chat-inp-row{padding:11px 13px;border-top:1px solid var(--border);display:flex;gap:8px;background:#f8f9ff;}
.chat-inp-row input{flex:1;background:var(--white);border:1.5px solid var(--border);border-radius:9px;padding:9px 13px;color:var(--text);font-family:'Poppins',sans-serif;font-size:.85rem;outline:none;transition:border .2s;}
.chat-inp-row input:focus{border-color:var(--blue);}
.send-btn{padding:9px 16px;background:var(--blue);border:none;border-radius:9px;color:#fff;font-family:'Poppins',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer;transition:background .2s;}
.send-btn:hover{background:var(--blue-dark);}


.pw-wrap{position:relative;}
.pw-wrap input{padding-right:40px !important;}
.pw-eye-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);display:flex;align-items:center;padding:0;}
.pw-eye-btn:hover{color:var(--blue);}
.pw-eye-btn svg{width:17px;height:17px;}


  .main{margin-left:180px;}
  .chat-layout{grid-template-columns:1fr;}
  .conv-list{display:none;}
}

  .main{margin-left:0;}
  .topbar{padding:12px 14px;}
  .content{padding:14px;}
}

/* ── Hamburger & Mobile Sidebar ── */
.ham-btn{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:8px;z-index:300;border-radius:8px;transition:background .2s;}
.ham-btn:hover{background:var(--blue-light);}
.ham-btn span{display:block;width:20px;height:2px;background:var(--blue);border-radius:2px;transition:all .3s;}
.ham-btn.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
.ham-btn.open span:nth-child(2){opacity:0;transform:scaleX(0);}
.ham-btn.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:199;backdrop-filter:blur(2px);}
.sidebar-overlay.show{display:block;}
@media(max-width:900px){
  .ham-btn{display:flex;}
  .sidebar{transform:translateX(-100%);z-index:200;}
  .sidebar.open{transform:translateX(0);box-shadow:4px 0 24px rgba(0,0,0,.2);}
  .main{margin-left:0 !important;width:100% !important;}
  .topbar{padding:12px 16px;}
  .content{padding:16px;}
  .stats-row{grid-template-columns:repeat(2,1fr);}
  .chat-layout{grid-template-columns:1fr;height:auto;min-height:500px;}
  .conv-list{display:none;}
  .table-wrap{overflow-x:auto;}
  table{min-width:500px;}
  .row2{grid-template-columns:1fr;}
}
@media(max-width:480px){
  .stats-row{grid-template-columns:1fr 1fr;}
  .content{padding:12px;}
  .topbar h2{font-size:.9rem;}
}

/* Security: hide page until auth verified */
body.auth-loading{visibility:hidden;}
.auth-block{display:none;position:fixed;inset:0;background:#f0f2fa;z-index:9999;
  flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.auth-block.show{display:flex;}
.auth-block .lock-icon{font-size:3rem;}
.auth-block p{color:#e8231a;font-weight:700;font-size:1rem;}
.auth-block small{color:#6b7280;font-size:.82rem;}
</style>
</head>
<body class="auth-loading">
<div class="auth-block" id="auth-block">
  <div class="lock-icon">🔒</div>
  <p>Access Denied</p>
  <small>You must be logged in as a Designer to view this page.</small>
  <small>Redirecting to login...</small>
</div>

<div class="sidebar-overlay" id="sb-overlay" onclick="closeSidebar()"></div>
<div class="sidebar" id="sidebar">
  <div class="sb-logo">
    <img src="images/logo.png" alt="">
    <div><div class="brand">Kinetic</div><div class="role">Designer</div></div>
  </div>
  <nav class="sb-nav">
    <button class="sb-btn active" onclick="showPanel('overview',this);closeSidebar()"><span class="icon">📊</span>Overview</button>
    <button class="sb-btn" onclick="showPanel('chat',this);closeSidebar()">
      <span class="icon">💬</span>Chat
      <span id="chat-badge" style="margin-left:auto;background:var(--red);color:#fff;font-size:.62rem;font-weight:700;border-radius:10px;padding:1px 6px;display:none;"></span>
    </button>
  </nav>
  <div class="sb-bottom">
    <button class="logout-btn" onclick="logout()">🚪 Logout</button>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <button class="ham-btn" id="ham-btn" onclick="toggleSidebar()" aria-label="Open menu"><span></span><span></span><span></span></button>
    <h2 id="topbar-title">Designer Overview</h2>
    <div class="user-chip"><div class="dot-g"></div><span id="designer-name">Designer</span></div>
  </div>
  <div class="content">

    <div id="panel-overview" class="panel active">
      <div class="stats-row" id="d-stats"></div>
    </div>

    <div id="panel-chat" class="panel">
      <div class="section-title">Customer Conversations</div>
      <div class="chat-layout">
        <div class="conv-list">
          <div class="conv-hdr">Conversations</div>
          <div id="conv-inner"></div>
        </div>
        <div class="chat-pane" id="chat-pane">
          <div class="no-conv">← Select a conversation to start chatting</div>
        </div>
      </div>
    </div>

    

  </div>
</div>

<script src="db.js"></script>
<script>
// ── SECURITY GUARD ──────────────────────────────────────
(function() {
  const s = KC.getSession();
  if (!s || s.role !== 'designer') {
    document.getElementById('auth-block').classList.add('show');
    setTimeout(() => { window.location.href = 'login.html'; }, 1800);
    return;
  }
  // Auth passed — reveal page
  document.body.classList.remove('auth-loading');
})();
const session = KC.getSession();

const DESIGNER_ID = 'designer';
let activeConv = null, chatPoll = null;

document.getElementById('designer-name').textContent = KC.getSpecial().designer.username;

function showPanel(name, btn) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.sb-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  if(btn) btn.classList.add('active');
  const titles={overview:'Designer Overview',chat:'Customer Chat'};
  document.getElementById('topbar-title').textContent = titles[name];
  if(name==='overview') renderOverview();
  if(name==='chat')     { renderConvList(); startPoll(); }
  else stopPoll();
}

function badgeCls(s){ return s.replace(' ',''); }

function renderOverview() {
  const unread = KC.getMessages().filter(m=>m.to===DESIGNER_ID&&!m.read).length;
  const users = KC.getUsers().length;
  document.getElementById('d-stats').innerHTML=`
    <div class="stat-card"><div class="stat-num" style="color:var(--blue)">${users}</div><div class="stat-lbl">Customers</div></div>
    <div class="stat-card"><div class="stat-num red">${unread}</div><div class="stat-lbl">Unread Msgs</div></div>`;
}



function renderConvList() {
  const msgs = KC.getMessages();
  // Get all unique user IDs that have talked with designer (exclude designer-to-designer)
  const uids=[...new Set(msgs
    .filter(m => m.from===DESIGNER_ID || m.to===DESIGNER_ID)
    .map(m => m.from===DESIGNER_ID ? m.to : m.from)
    .filter(id => id !== DESIGNER_ID)
  )];
  const unread=msgs.filter(m=>m.to===DESIGNER_ID&&!m.read).length;
  const badge=document.getElementById('chat-badge');
  if(unread>0){badge.textContent=unread;badge.style.display='inline';}else badge.style.display='none';
  if(!uids.length){document.getElementById('conv-inner').innerHTML='<p style="padding:14px;color:var(--muted);font-size:.78rem">No customer conversations yet.</p>';return;}
  const users=KC.getUsers();
  document.getElementById('conv-inner').innerHTML=uids.map(uid=>{
    const u=users.find(x=>x.id===uid);
    const c=KC.getConversation(uid,DESIGNER_ID);
    const last=c[c.length-1];
    const hasUnread=msgs.some(m=>m.from===uid&&m.to===DESIGNER_ID&&!m.read);
    const displayName = u ? u.username : uid;
    return `<div class="conv-item ${activeConv===uid?'active':''}" onclick="openConv('${uid}','${displayName}')">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div class="conv-name">${displayName}</div>
        ${hasUnread?'<div class="unread-dot"></div>':''}
      </div>
      <div class="conv-preview">${last ? esc(last.text.substring(0,40)) : 'No messages'}</div>
    </div>`;
  }).join('');
  // Auto-open first conversation if none is selected yet
  if (!activeConv && uids.length > 0) {
    const u = users.find(x=>x.id===uids[0]);
    openConv(uids[0], u ? u.username : uids[0]);
  }
}

function openConv(uid,name){
  activeConv=uid; KC.markRead(uid,DESIGNER_ID); renderConvList(); loadPane(uid,name);
}

function loadPane(uid,name){
  const pane=document.getElementById('chat-pane');
  // If pane already showing this conversation, just refresh messages (don't rebuild whole pane)
  const existingTop = pane.querySelector('.chat-top');
  if (existingTop && activeConv === uid) {
    refreshMessages(uid, name);
    return;
  }
  // Build full pane (first time opening this conversation)
  pane.innerHTML=`
    <div class="chat-top">💬 ${name}</div>
    <div class="messages" id="d-msgs"></div>
    <div class="chat-inp-row">
      <input type="text" id="d-inp" placeholder="Reply to ${name}…" onkeydown="if(event.key==='Enter')dSend('${uid}','${name}')">
      <button class="send-btn" onclick="dSend('${uid}','${name}')">Send</button>
    </div>`;
  refreshMessages(uid, name);
}

function refreshMessages(uid, name){
  const msgs=KC.getConversation(uid,DESIGNER_ID);
  const container=document.getElementById('d-msgs');
  if(!container) return;
  const atBottom = container.scrollHeight - container.scrollTop <= container.clientHeight + 60;
  container.innerHTML = msgs.length
    ? msgs.map(m=>{
        const isMe=m.from===DESIGNER_ID;
        const t=new Date(m.ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
        return `<div class="msg-row ${isMe?'me':'them'}"><div><div class="bubble">${esc(m.text)}</div><div class="msg-time">${isMe?'You':name} · ${t}</div></div></div>`;
      }).join('')
    : '<div style="color:var(--muted);font-size:.8rem;text-align:center;padding:20px;">No messages yet. Wait for the customer to send a message.</div>';
  if(atBottom) container.scrollTop=container.scrollHeight;
}

function dSend(uid,name){
  const inp=document.getElementById('d-inp');
  const t=inp.value.trim();
  if(!t)return;
  KC.sendMessage(DESIGNER_ID,uid,t);
  inp.value='';
  refreshMessages(uid, name||uid);
  renderConvList();
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}
function startPoll(){
  if(chatPoll)return;
  chatPoll=setInterval(()=>{
    renderConvList();
    if(activeConv){
      const u=KC.getUsers().find(x=>x.id===activeConv);
      refreshMessages(activeConv, u?u.username:activeConv);
    }
  },2000);
}
function stopPoll(){clearInterval(chatPoll);chatPoll=null;}


function togglePw(id,btn){const inp=document.getElementById(id);const show=inp.type==='password';inp.type=show?'text':'password';btn.querySelector('svg').innerHTML=show?'<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'   :'<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'}

function logout(){KC.clearSession();window.location.href='login.html';}

renderOverview();

// Mobile sidebar toggle
function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sb-overlay').classList.toggle('show');
  document.getElementById('ham-btn').classList.toggle('open');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sb-overlay').classList.remove('show');
  document.getElementById('ham-btn').classList.remove('open');
}

</script>
</body>
</html>
